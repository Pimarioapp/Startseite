<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pimarió</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Wichtig: Hintergrundfarbe exakt wie deine Grafik */
            background-color: #f7f9f6; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px; /* Kleiner Sicherheitsabstand zum Rand */
        }
        .container img {
            width: 100%;
            height: 100%;
            /* Zeigt immer das komplette Bild, ohne Abschneiden */
            object-fit: contain; 
        }

        /* PC-ANSICHT */
        @media (min-width: 769px) {
            .handy-bild { display: none; }
            .pc-bild { display: block; }
        }

        /* HANDY-ANSICHT */
        @media (max-width: 768px) {
            .pc-bild { display: none; }
            .handy-bild { display: block; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="landingpage.png" class="pc-bild" alt="Pimarió PC">
        
        <img src="landingpage-handy.png" class="handy-bild" alt="Pimarió Handy">
    </div>

</body>
</html>
