<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pimario – Dein persönlicher Einkaufsmanager</title>
<meta name="description" content="Vergleiche Angebote österreichischer Händler und plane deinen Einkauf intelligent mit Pimario.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://www.pimario.com/">
<link rel="icon" href="blatt.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#f7f9f6;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
.desktop{display:block}
.mobile{display:none}
.desktop img,.mobile img{display:block;width:100%;height:auto}
.wrapper{position:relative}
.instagram{
position:absolute;
top:2%;
right:2%;
width:220px;
height:90px;
z-index:999;
}

/* Ultra kompakter Premium Footer */
footer{
background:linear-gradient(180deg,#133d23 0%,#0d2c1a 100%);
text-align:center;
color:#fff;
padding:24px 20px 18px;
border-top:1px solid rgba(255,255,255,.05);
}

.footer-brand{
font-size:28px;
font-weight:700;
letter-spacing:-.5px;
line-height:1;
}

.copy{
font-weight:300;
color:rgba(255,255,255,.58);
margin-right:6px;
}

.footer-sub{
margin-top:8px;
font-size:13px;
color:rgba(255,255,255,.55);
font-weight:300;
}

.footer-line{
width:90px;
height:1px;
background:rgba(180,235,190,.22);
margin:14px auto;
}

.footer-links{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
}

.footer-links a{
font-size:14px;
text-decoration:none;
color:rgba(255,255,255,.88);
transition:.2s;
}

.footer-links a:hover{
color:#b8eebf;
}

.footer-divider{
color:rgba(255,255,255,.25);
}

@media(max-width:768px){

.desktop{display:none!important}
.mobile{display:block!important}

.instagram{
width:150px;
height:60px;
}

footer{
padding:20px 16px 16px;
}

.footer-brand{
font-size:22px;
}

.footer-sub{
font-size:12px;
margin-top:6px;
}

.footer-line{
width:70px;
margin:12px auto;
}

.footer-links{
gap:10px;
}

.footer-links a{
font-size:13px;
}

}
</style>
</head>

<body>

<div class="wrapper">

<div class="desktop">
<img src="landingpage.png" alt="Pimario">
</div>

<div class="mobile">
<img src="landingpage-handy.png" alt="Pimario">
</div>

<a class="instagram"
href="https://www.instagram.com/pimario.app/"
target="_blank"
rel="noopener noreferrer"
aria-label="Instagram"></a>

</div>

<footer>

<div class="footer-brand">
<span class="copy">© 2026</span>Pimario
</div>

<div class="footer-sub">
Eine Marke der JB Trading GmbH
</div>

<div class="footer-line"></div>

<div class="footer-links">
<a href="impressum.html">Impressum</a>
<span class="footer-divider">|</span>
<a href="datenschutz.html">Datenschutz</a>
</div>

</footer>

</body>
</html>
