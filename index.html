<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pimarió</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f7f9f6; /* Die Hintergrundfarbe deines Bildes */
        }
        .container {
            width: 100%;
            height: 100%;
        }
        .container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* PC-ANSICHT: Wenn der Bildschirm breiter als 768 Pixel ist */
        @media (min-width: 769px) {
            .handy-bild { display: none; }
            .pc-bild { display: block; }
        }

        /* HANDY-ANSICHT: Wenn der Bildschirm kleiner ist */
        @media (max-width: 768px) {
            .pc-bild { display: none; }
            .handy-bild { display: block; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="landingpage.png" class="pc-bild" alt="Pimarió PC">
        
        <img src="landingpage-handy.png" class="handy-bild" alt="Pimarió Handy">
    </div>

</body>
</html>
