<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pimario – Dein persönlicher Einkaufsmanager</title>

<meta name="description" content="Vergleiche Angebote österreichischer Händler und plane deinen Einkauf intelligent mit Pimario.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://www.pimario.com/">
<link rel="icon" href="blatt.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    width:100%;
    overflow-x:hidden;
    background:#f7f9f6;
    font-family:Arial,Helvetica,sans-serif;
}

.desktop{display:block;}
.mobile{display:none;}

.desktop img,
.mobile img{
    display:block;
    width:100%;
    height:auto;
}

.wrapper{
    position:relative;
}

.instagram{
    position:absolute;
    top:2%;
    right:2%;
    width:220px;
    height:90px;
    z-index:999;
}

/* ---------- PREMIUM FOOTER ---------- */

footer{
    background:radial-gradient(circle at top,#174528 0%,#11331f 45%,#0c2417 100%);
    text-align:center;
    color:#fff;
    padding:70px 20px 55px;
    box-shadow:inset 0 1px rgba(255,255,255,.04);
}

.footer-brand{
    font-size:56px;
    font-weight:700;
    letter-spacing:-1px;
    line-height:1.1;
}

.footer-brand .copy{
    color:rgba(255,255,255,.60);
    font-weight:300;
    margin-right:10px;
}

.footer-sub{
    margin-top:16px;
    color:rgba(255,255,255,.55);
    font-size:20px;
    font-weight:300;
    letter-spacing:.4px;
}

.footer-line{
    width:220px;
    height:1px;
    background:rgba(150,220,170,.25);
    margin:38px auto;
}

.footer-links{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:28px;
}

.footer-links a{
    color:rgba(255,255,255,.90);
    text-decoration:none;
    font-size:19px;
    transition:.25s;
}

.footer-links a:hover{
    color:#A9E4B3;
}

.footer-divider{
    color:rgba(150,220,170,.35);
}

@media(max-width:768px){

.desktop{display:none!important;}
.mobile{display:block!important;}

.instagram{
    width:150px;
    height:60px;
}

footer{
    padding:48px 20px 40px;
}

.footer-brand{
    font-size:38px;
}

.footer-sub{
    font-size:16px;
}

.footer-links{
    gap:18px;
}

.footer-links a{
    font-size:16px;
}

.footer-line{
    width:170px;
    margin:28px auto;
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="desktop">
<img src="landingpage.png" alt="Pimario">
</div>

<div class="mobile">
<img src="landingpage-handy.png" alt="Pimario">
</div>

<a class="instagram"
href="https://www.instagram.com/pimario.app/"
target="_blank"
rel="noopener noreferrer"
aria-label="Instagram"></a>

</div>

<footer>

<div class="footer-brand">
<span class="copy">© 2026</span>Pimario
</div>

<div class="footer-sub">
Eine Marke der JB Trading GmbH
</div>

<div class="footer-line"></div>

<div class="footer-links">
<a href="impressum.html">Impressum</a>
<span class="footer-divider">|</span>
<a href="datenschutz.html">Datenschutz</a>
</div>

</footer>

</body>
</html>
