<!DOCTYPE html>
<html lang="de">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pimario – Dein persönlicher Einkaufsmanager</title>

<meta name="description" content="Vergleiche Angebote österreichischer Händler und plane deinen Einkauf intelligent mit Pimario.">

<meta name="robots" content="index,follow">

<link rel="canonical" href="https://www.pimario.com/">

<link rel="icon" href="blatt.png">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    overflow-x:hidden;
    background:#f7f9f6;
    font-family:Arial,Helvetica,sans-serif;
}

.desktop{
    display:block;
}

.mobile{
    display:none;
}

.desktop img,
.mobile img{
    display:block;
    width:100%;
    height:auto;
}

.wrapper{
    position:relative;
}

.instagram{
    position:absolute;
    top:2%;
    right:2%;
    width:220px;
    height:90px;
    z-index:999;
}

/* ---------- FOOTER ---------- */

footer{
    background:#0F3F21;
    text-align:center;
    padding:35px 20px 28px;
}

.footer-brand{
    margin-bottom:18px;
}

.brand{
    display:block;
    color:#ffffff;
    font-size:26px;
    font-weight:700;
    letter-spacing:0.3px;
}

.subbrand{
    display:block;
    margin-top:6px;
    color:rgba(255,255,255,0.65);
    font-size:14px;
    font-weight:400;
    letter-spacing:0.4px;
}

.footer-links{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:16px;
    font-size:15px;
}

.footer-links a{
    color:rgba(255,255,255,0.88);
    text-decoration:none;
    transition:0.2s;
}

.footer-links a:hover{
    color:#ffffff;
    text-decoration:none;
}

.footer-divider{
    color:rgba(255,255,255,0.35);
}

@media screen and (max-width:768px){

.desktop{
    display:none !important;
}

.mobile{
    display:block !important;
}

.instagram{
    width:150px;
    height:60px;
}

.brand{
    font-size:22px;
}

.subbrand{
    font-size:13px;
}

.footer-links{
    font-size:14px;
    gap:12px;
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="desktop">
<img src="landingpage.png" alt="Pimario">
</div>

<div class="mobile">
<img src="landingpage-handy.png" alt="Pimario">
</div>

<a class="instagram"
href="https://www.instagram.com/pimario.app/"
target="_blank"
rel="noopener noreferrer"
aria-label="Instagram"></a>

</div>

<footer>

    <div class="footer-brand">
        <span class="brand">© 2026 Pimario</span>
        <span class="subbrand">Eine Marke der JB Trading GmbH</span>
    </div>

    <div class="footer-links">
        <a href="impressum.html">Impressum</a>
        <span class="footer-divider">•</span>
        <a href="datenschutz.html">Datenschutz</a>
    </div>

</footer>

</body>
</html>
