<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pimario – Dein persönlicher Einkaufsmanager</title>
<meta name="description" content="Vergleiche Angebote österreichischer Händler und plane deinen Einkauf intelligent mit Pimario.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://www.pimario.com/">
<link rel="icon" href="blatt.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#f7f9f6;font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
.desktop{display:block}.mobile{display:none}
.desktop img,.mobile img{display:block;width:100%;height:auto}
.wrapper{position:relative}
.instagram{position:absolute;top:2%;right:2%;width:220px;height:90px;z-index:999}

/* Premium compact footer */
footer{
background:radial-gradient(circle at top,#174528 0%,#11331f 45%,#0c2417 100%);
text-align:center;
padding:36px 20px 28px;
color:#fff;
box-shadow:inset 0 1px rgba(255,255,255,.05)
}
.footer-brand{
font-size:34px;
font-weight:700;
letter-spacing:-.8px;
line-height:1;
}
.copy{
font-weight:300;
color:rgba(255,255,255,.58);
margin-right:8px;
}
.footer-sub{
margin-top:10px;
font-size:15px;
font-weight:300;
color:rgba(255,255,255,.58);
letter-spacing:.3px;
}
.footer-line{
width:160px;
height:1px;
background:rgba(170,230,185,.22);
margin:20px auto;
}
.footer-links{
display:flex;
justify-content:center;
align-items:center;
gap:18px;
}
.footer-links a{
color:rgba(255,255,255,.9);
text-decoration:none;
font-size:16px;
transition:.2s;
}
.footer-links a:hover{color:#b9efc1}
.footer-divider{color:rgba(170,230,185,.35)}

@media(max-width:768px){
.desktop{display:none!important}
.mobile{display:block!important}
.instagram{width:150px;height:60px}
footer{padding:28px 18px 22px}
.footer-brand{font-size:24px}
.footer-sub{font-size:13px;margin-top:8px}
.footer-line{width:120px;margin:16px auto}
.footer-links{gap:12px}
.footer-links a{font-size:14px}
}
</style>
</head>
<body>
<div class="wrapper">
<div class="desktop"><img src="landingpage.png" alt="Pimario"></div>
<div class="mobile"><img src="landingpage-handy.png" alt="Pimario"></div>
<a class="instagram" href="https://www.instagram.com/pimario.app/" target="_blank" rel="noopener noreferrer" aria-label="Instagram"></a>
</div>

<footer>
<div class="footer-brand"><span class="copy">© 2026</span>Pimario</div>
<div class="footer-sub">Eine Marke der JB Trading GmbH</div>
<div class="footer-line"></div>
<div class="footer-links">
<a href="impressum.html">Impressum</a>
<span class="footer-divider">|</span>
<a href="datenschutz.html">Datenschutz</a>
</div>
</footer>

</body>
</html>
