    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    overflow-x:hidden;
    background:#f7f9f6;
    font-family:Arial,Helvetica,sans-serif;
}

.desktop{
    display:block;
}

.mobile{
    display:none;
}

.desktop img,
.mobile img{
    display:block;
    width:100%;
    height:auto;
}

.wrapper{
    position:relative;
}

.instagram{
    position:absolute;
    top:2%;
    right:2%;
    width:220px;
    height:90px;
    z-index:999;
}

footer{
    background:#0F3F21;
    color:white;
    text-align:center;
    padding:25px;
}

footer a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

footer a:hover{
    text-decoration:underline;
}

@media screen and (max-width:768px){

.desktop{
    display:none !important;
}

.mobile{
    display:block !important;
}

.instagram{
    width:150px;
    height:60px;
}

}

</style>
